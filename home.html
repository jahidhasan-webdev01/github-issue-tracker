<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS and Daisy UI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>GitHub Issue Tracker | Home</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <style>
        * {
            font-family: "Inter", sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100">
    <!-- Navigation bar -->
    <header class="bg-white border-b border-gray-200 pb-2">
        <div class="w-11/12 mx-auto flex justify-between mt-5 gap-5">
            <div class="flex flex-col md:flex-row items-center gap-2 cursor-pointer">
                <img class="w-6 md:w-8" src="./assets/github-logo.png" alt="GitHub">
                <h1 class="font-bold text-sm text-center">GitHub Issues Tracker</h1>
            </div>

            <div class="flex gap-2 items-center">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="search-input" type="search" required placeholder="Search issues..." />
                </label>
                <button onclick="handleSearch()" class="btn btn-primary">search</button>
            </div>
        </div>
    </header>

    <section class="mt-5 lg:mt-10 w-11/12 lg:w-8/12 mx-auto min-h-screen">
        <div class="bg-white p-4 space-x-2 rounded shadow">
            <button onclick="loadData('all')" id="btn-all" class="btn btn-sm btn-primary">All</button>
            <button onclick="loadData('open')" id="btn-open" class="btn btn-sm">Open</button>
            <button onclick="loadData('closed')" id="btn-closed" class="btn btn-sm">Closed</button>
        </div>

        <div id="loading-container" class="min-h-[50vh] flex items-center justify-center hidden">
            <span class="loading loading-spinner loading-xl"></span>
        </div>

        <div id="issues-container">
            <div
                class="mt-5 bg-white p-4 rounded flex items-center justify-between gap-5 border-b-2 border-gray-200 shadow">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-100 p-2 rounded-full">
                        <img src="/assets/aperture.png" alt="aperture">
                    </div>
                    <div>
                        <h1 class="font-bold"><span id="issue-count"></span> Issues</h1>
                        <p class="text-gray-600 text-xs">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex text-sm font-semibold gap-5">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 bg-green-700 rounded-full"></span>
                        <p>Open</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 bg-purple-700 rounded-full"></span>
                        <p>Closed</p>
                    </div>
                </div>
            </div>

            <!-- Card container -->
            <div id="card-container"
                class="bg-gray-50 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 p-5 gap-5">

                <!-- Issue card will appear here dynamically -->

            </div>
        </div>
    </section>

    <dialog id="issue_detail_modal" class="modal modal-bottom sm:modal-middle">
    </dialog>

    <script src="./javascript/home.js"></script>
</body>

</html>
