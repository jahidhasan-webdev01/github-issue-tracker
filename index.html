<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS and Daisy UI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>GitHub Issue Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <style>
        * {
            font-family: "Inter", sans-serif;
        }
    </style>
</head>

<body class="bg-base-100">
    <!-- Login form -->
    <div class="min-h-screen flex justify-center items-center ">
        <div class="w-11/12 md:w-2/3 lg:w-1/3 mx-auto shadow-2xl border border-gray-100 px-8 py-16 space-y-5 rounded-2xl">
            <div class="flex flex-col items-center justify-center">
                <img src="./assets/github-logo.png" alt="">
                <h1 class="text-xl font-bold mt-5">GitHub Issues Tracker</h1>
                <p class="text-gray-600 text-sm">Sign in to manage your issues</p>
            </div>

            <fieldset class="fieldset space-y-3">
                <div class="space-y-2">
                    <label class="label font-bold text-black text-sm">Username</label>
                    <input type="text" class="input w-full" placeholder="Enter Username" />
                    <p class="text-primary font-semibold">Default: admin</p>
                </div>
                <div class="space-y-2">
                    <label class="label font-bold text-black text-sm">Password</label>
                    <input type="password" class="input w-full" placeholder="Enter Password" />
                    <p class="text-primary font-semibold">Default: admin123</p>
                </div>
                <div>
                    <button class="btn btn-primary w-full">Sign In</button>
                </div>

                <div class="flex items-center gap-4 mt-2">
                    <div class="w-full h-px bg-gray-300"></div>
                    <span class="text-gray-500 text-sm">OR</span>
                    <div class="w-full h-px bg-gray-300"></div>
                </div>

                <div class="space-y-2">
                    <p class="text-center text-gray-600">Demo Credentials:</p>
                    <div class="bg-gray-100 text-center space-y-1 py-5">
                        <p class="text-sm"><span class="font-bold">Username:</span> admin </p>
                        <p class="text-sm"><span class="font-bold">Password:</span> admin123</p>
                    </div>
                </div>
            </fieldset>

        </div>
    </div>

    <script src="./javascript/script.js"></script>
</body>

</html>
